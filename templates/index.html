<!DOCTYPE html>
<html>
<head>
    <title>Emotion Detection</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .container {
            margin-top: 100px;
        }

        textarea {
            width: 60%;
            height: 120px;
            padding: 10px;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 16px;
        }

        button {
            margin-top: 15px;
            padding: 10px 25px;
            border: none;
            border-radius: 20px;
            background: #ff7eb3;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #ff4f81;
            transform: scale(1.05);
        }

        .result {
            margin-top: 30px;
            font-size: 22px;
            font-weight: bold;
            padding: 10px;
            border-radius: 10px;
            display: inline-block;
        }

        /* Dynamic colors */
        .Sadness { background: #3498db; }
        .Joy { background: #f1c40f; color: black; }
        .Love { background: #e74c3c; }
        .Anger { background: #c0392b; }
        .Fear { background: #8e44ad; }
        .Surprise { background: #2ecc71; }

    </style>
</head>

<body>

<div class="container">
    <h1>💬 Emotion Detection App</h1>

    <form action="/predict" method="post">
        <textarea name="text" placeholder="Type your sentence here..."></textarea><br>
        <button type="submit">Predict Emotion</button>
    </form>

    {% if prediction_text %}
        <div class="result {{ prediction_text }}">
            Prediction: {{ prediction_text }}
        </div>
    {% endif %}
</div>

</body>
</html>
